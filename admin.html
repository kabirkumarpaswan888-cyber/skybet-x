<!DOCTYPE html>
<html>
<body style="background:#000;color:#fff;text-align:center">

<h2>Admin Panel</h2>

<button onclick="dep()">Approve Deposit</button>
<button onclick="withd()">Approve Withdraw</button>

<script>

function dep(){
  let u=prompt("Username");
  let amt=localStorage.getItem("deposit_"+u);
  let bal=localStorage.getItem(u+"_bal")||0;

  localStorage.setItem(u+"_bal",Number(bal)+Number(amt));
  localStorage.removeItem("deposit_"+u);

  alert("Approved");
}

function withd(){
  let u=prompt("Username");
  let amt=localStorage.getItem("withdraw_"+u);
  let bal=localStorage.getItem(u+"_bal")||0;

  localStorage.setItem(u+"_bal",bal-amt);
  localStorage.removeItem("withdraw_"+u);

  alert("Done");
}

</script>

</body>
</html>
