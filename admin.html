<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body{
  background:#000;
  color:#fff;
  text-align:center;
  font-family:Arial;
}
button{
  padding:12px;
  margin:10px;
  width:80%;
  background:#00ffcc;
  border:none;
}
</style>

<script>
function depositApprove(){
  let u=prompt("Username");
  let amt=localStorage.getItem("deposit_"+u);

  let bal=localStorage.getItem(u+"_bal")||0;
  bal=Number(bal)+Number(amt);

  localStorage.setItem(u+"_bal",bal);
  localStorage.removeItem("deposit_"+u);

  alert("Deposit Approved");
}

function withdrawApprove(){
  let u=prompt("Username");
  let amt=localStorage.getItem("withdraw_"+u);

  let bal=localStorage.getItem(u+"_bal")||0;
  bal=Number(bal)-Number(amt);

  localStorage.setItem(u+"_bal",bal);
  localStorage.removeItem("withdraw_"+u);

  alert("Withdraw Approved");
}
</script>

</head>

<body>

<h2>👨‍💼 Admin Panel</h2>

<button onclick="depositApprove()">Approve Deposit</button>
<button onclick="withdrawApprove()">Approve Withdraw</button>

</body>
</html>
