<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#1a1a2e,#16213e);
  color:#fff;
}

.top{
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#000;
}

.slider{
  padding:10px;
  text-align:center;
  background:linear-gradient(45deg,#ff0057,#ff7b00);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

button{
  padding:8px;
  width:100%;
  margin-top:5px;
  background:#00ffcc;
  border:none;
  border-radius:5px;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>

<script>
let user = localStorage.getItem("currentUser");
let bal = localStorage.getItem(user+"_bal") || 0;

function update(){
  document.getElementById("bal").innerText=bal;
}
window.onload=update;

function logout(){
  window.location="index.html";
}

function deposit(){
  let amt=prompt("Enter Amount");
  localStorage.setItem("deposit_"+user,amt);
  alert("Request Sent");
}

function withdraw(){
  let amt=prompt("Enter Amount");
  localStorage.setItem("withdraw_"+user,amt);
  alert("Withdraw Request Sent");
}

/* GAME SYSTEM */
function play(type){
  let r=Math.random();

  if(type=="aviator"){
    r>0.5 ? updateBal(20,"🚀 Win ₹20") : updateBal(-10,"💥 Crash Lose ₹10");
  }
  if(type=="dragon"){
    r>0.5 ? updateBal(15,"🐉 Win ₹15") : updateBal(-10,"🐯 Lose ₹10");
  }
  if(type=="chicken"){
    r>0.5 ? updateBal(10,"🐔 Win ₹10") : updateBal(-5,"Lose ₹5");
  }
  if(type=="chicken2"){
    r>0.5 ? updateBal(12,"🐔2 Win ₹12") : updateBal(-6,"Lose ₹6");
  }
}

function updateBal(a,msg){
  bal = Number(bal)+a;
  localStorage.setItem(user+"_bal",bal);
  update();
  alert(msg);
}
</script>

</head>

<body>

<div class="top">
<div>💰 Balance: ₹<span id="bal">0</span></div>
<div onclick="logout()">Logout</div>
</div>

<div class="slider">🔥 Fast Withdraw</div>

<button onclick="deposit()">💸 Deposit</button>
<button onclick="withdraw()">💵 Withdraw</button>

<div class="grid">

<div class="card">Aviator<button onclick="play('aviator')">Play</button></div>
<div class="card">Dragon vs Tiger<button onclick="play('dragon')">Play</button></div>
<div class="card">Chicken Road<button onclick="play('chicken')">Play</button></div>
<div class="card">Chicken Road 2<button onclick="play('chicken2')">Play</button></div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>🎮 Games</div>
<div>💰 Cashout</div>
<div>👤 Account</div>
</div>

</body>
  </html>
