<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.top{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.slider{
  overflow:hidden;
}

.slides{
  display:flex;
  animation:slide 9s infinite;
}

.slide{
  min-width:100%;
  padding:40px;
  text-align:center;
  font-weight:bold;
}

.s1{background:#ff0055;}
.s2{background:#00ccff;}
.s3{background:#00ff99;}

@keyframes slide{
  0%{margin-left:0;}
  33%{margin-left:-100%;}
  66%{margin-left:-200%;}
  100%{margin-left:0;}
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 10px #00ffcc;
}

.play{
  margin-top:10px;
  background:#00ffcc;
  padding:5px;
  border-radius:5px;
}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
</style>

</head>

<body>

<div class="top">
<div>💰 Balance: 0</div>
<div>⚙</div>
</div>

<div class="slider">
  <div class="slides">
    <div class="slide s1">🔥 Fast Withdraw</div>
    <div class="slide s2">🎮 Play & Win</div>
    <div class="slide s3">💸 Cashout</div>
  </div>
</div>

<div class="grid">

<div class="card">Teen Patti<div class="play">Play</div></div>
<div class="card">Andar Bahar<div class="play">Play</div></div>
<div class="card">Roulette<div class="play">Play</div></div>
<div class="card">Cricket<div class="play">Play</div></div>

</div>

<div class="bottom">
<div>🏠 Home</div>
<div>🎮 Games</div>
<div>💵 Cashout</div>
<div>👤 Account</div>
</div>

</body>
</html>
