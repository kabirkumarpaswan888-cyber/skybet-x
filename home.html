<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#1a1a2e,#16213e);
  color:#fff;
}

.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#000;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:10px;
  text-align:center;
  animation:pop 0.5s;
}

button{
  padding:10px;
  width:100%;
  margin-top:5px;
  border:none;
  border-radius:5px;
  background:#00ff99;
}

button:hover{
  transform:scale(1.05);
}

@keyframes pop{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1);}
}

#depositBox{
  display:none;
  position:fixed;
  top:0;
  width:100%;
  height:100%;
  background:#000000dd;
  text-align:center;
  padding-top:100px;
}
</style>
</head>

<body>

<div class="top">
<div>💰 ₹<span id="bal">0</span></div>
<div onclick="logout()">Logout</div>
</div>

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>

<div class="grid">
<div class="card">Aviator<button onclick="play()">Play</button></div>
<div class="card">Dragon<button onclick="play()">Play</button></div>
<div class="card">Chicken<button onclick="play()">Play</button></div>
<div class="card">Chicken 2<button onclick="play()">Play</button></div>
</div>

<div id="depositBox">
<h2>Scan & Pay</h2>
<img src="YOUR_QR_LINK" width="200"><br><br>
<button onclick="confirmDeposit()">I Paid</button>
<button onclick="closeDeposit()">Close</button>
</div>

<script>

let user=localStorage.getItem("currentUser");
let bal=localStorage.getItem(user+"_bal")||0;

function update(){document.getElementById("bal").innerText=bal;}
update();

function logout(){location="index.html";}

function deposit(){depositBox.style.display="block";}
function closeDeposit(){depositBox.style.display="none";}

function confirmDeposit(){
  let amt=prompt("Amount Paid");
  localStorage.setItem("deposit_"+user,amt);
  alert("Sent to admin");
}

function withdraw(){
  let amt=prompt("Withdraw Amount");
  localStorage.setItem("withdraw_"+user,amt);
  alert("Request sent");
}

function play(){
  let bet=prompt("Bet Amount");

  if(bet>bal){alert("Low Balance");return;}

  if(Math.random()>0.5){
    bal=Number(bal)+Number(bet);
    alert("Win 🎉");
  }else{
    bal=bal-bet;
    alert("Lose ❌");
  }

  localStorage.setItem(user+"_bal",bal);
  update();
}

</script>

</body>
</html>                                                                 </html>
