<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyBet X</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#0f2027,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#111;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

input{
  padding:10px;
  margin:10px;
  width:200px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  width:220px;
  background:#00ff99;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚀 SkyBet X</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login / Register</button>
</div>

<script>
function login(){
  let u=user.value;
  let p=pass.value;

  if(localStorage.getItem(u)){
    if(localStorage.getItem(u)==p){
      localStorage.setItem("currentUser",u);
      location="home.html";
    }else{
      alert("Wrong Password ❌");
    }
  }else{
    localStorage.setItem(u,p);
    localStorage.setItem(u+"_bal",0);
    localStorage.setItem("currentUser",u);
    alert("Account Created ✅");
    location="home.html";
  }
}
</script>

</body>
</html>
