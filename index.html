<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyBet X</title>

<style>
body{
  background:linear-gradient(135deg,#000,#0f2027,#2c5364);
  color:#fff;
  text-align:center;
  font-family:Arial;
}
.box{
  margin-top:100px;
}
input{
  padding:12px;
  margin:10px;
  width:80%;
  border:none;
  border-radius:5px;
}
button{
  padding:12px;
  width:85%;
  margin:5px;
  background:#00ffcc;
  border:none;
  border-radius:5px;
}
</style>

<script>
function register(){
  let u=user.value;
  let p=pass.value;

  localStorage.setItem(u,p);
  localStorage.setItem(u+"_bal",0);

  alert("Registered ✅");
}

function login(){
  let u=user.value;
  let p=pass.value;

  if(localStorage.getItem(u)==p){
    localStorage.setItem("currentUser",u);
    window.location="home.html";
  }else{
    alert("Wrong ❌");
  }
}
</script>

</head>
<body>

<div class="box">
<h2>🚀 SkyBet X</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

</body>
</html>
