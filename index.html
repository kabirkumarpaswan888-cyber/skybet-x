<!DOCTYPE html>
<html>
<head>
<title>SkyBet X</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.box{
  width:300px;
  margin:100px auto;
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px #00ffcc;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  border:none;
  background:#00ffcc;
  border-radius:5px;
  width:100%;
}

a{
  color:#00ffcc;
  cursor:pointer;
}
</style>

<script>
function showRegister(){
  document.getElementById("login").style.display="none";
  document.getElementById("register").style.display="block";
}

function showLogin(){
  document.getElementById("login").style.display="block";
  document.getElementById("register").style.display="none";
}

function register(){
  let u=document.getElementById("ru").value;
  let p=document.getElementById("rp").value;

  localStorage.setItem("user",u);
  localStorage.setItem("pass",p);

  alert("Registered Successfully");
  showLogin();
}

function login(){
  let u=document.getElementById("lu").value;
  let p=document.getElementById("lp").value;

  let su=localStorage.getItem("user");
  let sp=localStorage.getItem("pass");

  if(u==su && p==sp){
    window.location="home.html";
  }else{
    alert("Wrong Login");
  }
}
</script>

</head>

<body>

<!-- LOGIN -->
<div class="box" id="login">
<h2>Login</h2>

<input id="lu" placeholder="Username"><br>
<input id="lp" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>New user? <a onclick="showRegister()">Register</a></p>
</div>

<!-- REGISTER -->
<div class="box" id="register" style="display:none;">
<h2>Register</h2>

<input id="ru" placeholder="Username"><br>
<input id="rp" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>

<p>Already account? <a onclick="showLogin()">Login</a></p>
</div>

</body>
</html>
