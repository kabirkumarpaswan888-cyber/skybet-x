<!DOCTYPE html>
<html>
<head>
  <title>SkyBet X</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #000, #111, #000);
      background-size: 600% 600%;
      animation: bgMove 8s infinite;
      font-family: Arial;
    }

    @keyframes bgMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 20px #000;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }

    input {
      display: block;
      width: 220px;
      padding: 10px;
      margin: 10px auto;
      border: none;
      border-radius: 5px;
    }

    button {
      background: gold;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🚀 SkyBet X</h2>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">LOGIN</button>
</div>

<script>
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u === "admin" && p === "1234"){
    window.location.href = "home.html";
  } else {
    alert("Wrong Login ❌");
  }
}
</script>

</body>
</html>
